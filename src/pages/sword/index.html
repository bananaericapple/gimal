
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sword Master: Infinite Enhancement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
      body {
        font-family: 'Pretendard', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        margin: 0;
        overflow-x: hidden;
      }
      
      /* 기본 글로우 애니메이션 */
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 10px var(--aura-color, #ffffff)); opacity: 0.8; }
        50% { filter: drop-shadow(0 0 30px var(--aura-color, #ffffff)); opacity: 1; }
      }
      .glow-active {
        animation: pulse-glow 2s infinite ease-in-out;
      }

      /* 강화 시 진동 효과 */
      @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
      }
      .shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }
      
      /* 오라 회전 및 맥동 */
      @keyframes aura-spin-slow {
        from { transform: rotate(0deg) scale(1.1); }
        to { transform: rotate(360deg) scale(1.1); }
      }
      @keyframes aura-spin-fast {
        from { transform: rotate(360deg) scale(1.3); }
        to { transform: rotate(0deg) scale(1.3); }
      }
      .aura-rotate-slow { animation: aura-spin-slow 15s linear infinite; }
      .aura-rotate-fast { animation: aura-spin-fast 8s linear infinite; }
      
      @keyframes aura-breath {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.4); opacity: 0.5; }
      }
      .aura-breath { animation: aura-breath 4s ease-in-out infinite; }

      /* 부유 효과 */
      @keyframes floating {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(2deg); }
      }
      .floating { animation: floating 4s ease-in-out infinite; }

      /* 입자 흐름 */
      @keyframes particle-flow {
        from { background-position: 0 0; }
        to { background-position: 100% 100%; }
      }
      .particle-layer {
        position: absolute;
        inset: -50%;
        background-image: radial-gradient(circle, var(--aura-color, #fff) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: particle-flow 30s linear infinite;
        mask-image: radial-gradient(circle, black, transparent 70%);
      }

      /* 커스텀 스크롤바 */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
